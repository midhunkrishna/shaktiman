name: CI

on:
  push:
  pull_request:
    branches: [master]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - run: go build -tags sqlite_fts5 ./...

      - run: go vet -tags sqlite_fts5 ./...

      - run: go test -race -tags sqlite_fts5 ./...
